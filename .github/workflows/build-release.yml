name: Build modelizer bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the artifact (e.g. v1.2.3)"
        required: false
        default: "dev"
  push:
    tags:
      - "v*.*.*" # e.g. v1.2.3

permissions:
  contents: read

env:
  # Change miniserve version here (only once)
  MINISERVE_VERSION: "0.35.0"

  # Final zip name (e.g. modelizer-v1.0.0.zip)
  ZIP_NAME: "modelizer-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}.zip"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (Vite)
        run: npm run build:ci

      # Layout produced in the zip:
      # modelizer/
      #   modelizer.bat
      #   README.txt (optional)
      #   app/
      #     miniserve.exe
      #     dist/...
      - name: Cache miniserve
        id: cache_miniserve
        uses: actions/cache@v5
        with:
          path: .miniserve
          key: miniserve-${{ env.MINISERVE_VERSION }}

      - name: Download miniserve (if not cached)
        if: steps.cache_miniserve.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .miniserve
          MINISERVE_ASSET="miniserve-${MINISERVE_VERSION}-x86_64-pc-windows-msvc.exe"
          gh release download "v${MINISERVE_VERSION}" \
            --repo svenstaro/miniserve \
            --pattern "${MINISERVE_ASSET}" \
            --dir .miniserve
          mv ".miniserve/${MINISERVE_ASSET}" .miniserve/miniserve.exe

      - name: Package and zip
        run: |
          set -euo pipefail

          # Assemble folder structure
          rm -rf package
          mkdir -p package/modelizer/app/dist
          cp bundle/modelizer.bat package/modelizer/modelizer.bat
          [ -f bundle/README.txt ] && cp bundle/README.txt package/modelizer/README.txt || true
          cp -R dist/* package/modelizer/app/dist/
          cp .miniserve/miniserve.exe package/modelizer/app/miniserve.exe

          # Zip
          cd package && zip -r "../${ZIP_NAME}" modelizer

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload dist artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive Docker image version from tag
        id: image_vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            haanlaurent/modelizer:${{ steps.image_vars.outputs.version }}
            haanlaurent/modelizer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sftp:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check SFTP secrets
        id: sftp_check
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_TARGET_PATH: ${{ secrets.SFTP_TARGET_PATH }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${SFTP_HOST}" ] || [ -z "${SFTP_USER}" ] || [ -z "${SFTP_TARGET_PATH}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SFTP secrets not fully configured (host/user/target path). Skipping deploy."
          elif [ -z "${SFTP_PRIVATE_KEY}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SFTP_PRIVATE_KEY not configured. Skipping deploy."
          elif [ -z "${SFTP_KNOWN_HOSTS}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SFTP_KNOWN_HOSTS not configured. Skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy dist to personal webserver
        if: steps.sftp_check.outputs.configured == 'true'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
          SFTP_TARGET_PATH: ${{ secrets.SFTP_TARGET_PATH }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SFTP_PRIVATE_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${SFTP_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          lftp -c "
            set sftp:connect-program 'ssh -a -x -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts';
            set net:max-retries 2;
            open -u ${SFTP_USER}, sftp://${SFTP_HOST}:${SFTP_PORT:-22};
            mirror -R --delete --verbose dist/ ${SFTP_TARGET_PATH};
            bye
          "

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
